[project]
name = "swarm"
setup = "uv sync --extra sast"
workflow = [
    "dw project setup",
    "dw project run audit -- --repo psf/requests --max-files 20",
    "dw project run report",
]

[steps.audit]
description = "Run the audit brief — find bugs / security issues in a codebase"
run = "uv run swarm run audit"

[steps.onboarding]
description = "Run the onboarding brief — document a codebase's subsystems"
run = "uv run swarm run onboarding"

[steps.report]
description = "Print the latest run's report"
run = "uv run swarm report"

[steps.compare]
description = "Run a brief in realtime and async tiers; write analysis.md"
run = "uv run swarm compare"
