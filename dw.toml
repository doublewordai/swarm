[project]
name = "swarm-audit"
setup = "uv sync"
workflow = [
    "dw project setup",
    "dw project run audit -- --repo psf/requests --max-files 20",
    "dw project run report",
]

[steps.audit]
description = "Run the Doubleword agent swarm to audit a codebase"
run = "uv run swarm-audit audit"

[steps.report]
description = "Print the latest audit report"
run = "uv run swarm-audit report"

[steps.compare]
description = "Audit one repo in realtime and async tiers; write analysis.md"
run = "uv run swarm-audit compare"
